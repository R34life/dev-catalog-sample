# yaml-language-server: $schema=https://github.com/Azure/deployment-environments/releases/download/2022-11-11-preview/manifest.schema.json

name: LinuxPythonVM
version: 1.0.0
summary: Linux Python Developer VM
description: >
  Deploys a secure Ubuntu 22.04 LTS developer VM with Python 3.12.3 (pyenv),
  VNet/NSG networking, and Azure Bastion for secure browser-based SSH access.
  No public IP is exposed on the VM.
runner: Bicep
templatePath: azuredeploy.bicep

parameters:
  - id: vmName
    name: VM Name
    description: "Name for the developer VM (e.g. dev-raja)"
    type: string
    required: true

  - id: adminUsername
    name: Admin Username
    description: "Linux admin username"
    type: string
    default: "devuser"
    required: false

  - id: sshPublicKey
    name: SSH Public Key
    description: "Full contents of your .pub file (e.g. ssh-ed25519 AAAA... user@host)"
    type: string
    required: true

  - id: vmSize
    name: VM Size
    description: "Azure VM SKU"
    type: string
    default: "Standard_D4s_v5"
    allowed:
      - "Standard_D2s_v5"
      - "Standard_D4s_v5"
      - "Standard_D8s_v5"
    required: false

  - id: osDiskSizeGB
    name: OS Disk Size (GB)
    description: "Size of the OS disk"
    type: integer
    default: 128
    allowed:
      - 64
      - 128
      - 256
    required: false
