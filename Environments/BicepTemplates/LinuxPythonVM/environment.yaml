# yaml-language-server: $schema=https://github.com/Azure/deployment-environments/releases/download/2022-11-11-preview/manifest.schema.json
# comment 2
name: LinuxPythonVM
version: 1.0.0
summary: Linux Python Developer VM
description: >
  Deploys a secure Ubuntu 22.04 LTS x64 developer VM with Python 3.12.3 (pyenv),
  VNet/NSG networking, and Azure Bastion for secure SSH access.
  No public IP is exposed on the VM.
runner: Bicep
templatePath: azuredeploy.bicep

parameters:
  - id: vmName
    name: VM Name
    description: "Letters, numbers and hyphens only — no spaces or special characters (e.g. raja-py)"
    type: string
    required: true

  - id: adminUsername
    name: Admin Username
    description: "Linux admin username"
    type: string
    default: "devuser"
    required: false

  - id: sshPublicKey
    name: SSH Public Key
    description: "Full contents of your .pub file (e.g. ssh-ed25519 AAAA... user@host)"
    type: string
    required: true

  - id: vmSize
    name: VM Size
    description: "Standard_D2s_v3 recommended (2 vCPU, 8GB RAM)"
    type: string
    default: "Standard_D2s_v3"
    allowed:
      - "Standard_D2s_v3"
      - "Standard_D4s_v3"
    required: false
