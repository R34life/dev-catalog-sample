# yaml-language-server: $schema=https://github.com/Azure/deployment-environments/releases/download/2022-11-11-preview/manifest.schema.json

name: LinuxPythonVM
version: 1.0.0
summary: Linux Python Developer VM (ARM64)
description: >
  Deploys a secure Ubuntu 22.04 LTS ARM64 developer VM with Python 3.12.3 (pyenv),
  VNet/NSG networking, and Azure Bastion for secure SSH access.
  No public IP is exposed on the VM.
runner: Bicep
templatePath: azuredeploy.bicep

parameters:
  - id: vmName
    name: VM Name
    description: "Letters, numbers and hyphens only — no spaces or special characters (e.g. raja-py)"
    type: string
    required: true

  - id: adminUsername
    name: Admin Username
    description: "Linux admin username"
    type: string
    default: "devuser"
    required: false

  - id: sshPublicKey
    name: SSH Public Key
    description: "Full contents of your .pub file (e.g. ssh-ed25519 AAAA... user@host)"
    type: string
    required: true

  - id: vmSize
    name: VM Size
    description: "ARM64 VM SKU — Standard_B2ps_v2 is a good starting point for dev"
    type: string
    default: "Standard_B2ps_v2"
    allowed:
      - "Standard_B2pls_v2"
      - "Standard_B2ps_v2"
      - "Standard_B4pls_v2"
      - "Standard_B4ps_v2"
      - "Standard_B8ps_v2"
    required: false

  - id: osDiskSizeGB
    name: OS Disk Size (GB)
    description: "Size of the OS disk"
    type: integer
    default: 128
    allowed:
      - 64
      - 128
      - 256
    required: false
