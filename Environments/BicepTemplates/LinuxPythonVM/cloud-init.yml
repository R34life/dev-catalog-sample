#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - wget
  - build-essential
  - libssl-dev
  - zlib1g-dev
  - libbz2-dev
  - libreadline-dev
  - libsqlite3-dev
  - libncursesw5-dev
  - xz-utils
  - tk-dev
  - libxml2-dev
  - libxmlsec1-dev
  - libffi-dev
  - liblzma-dev
  - unzip
  - jq

write_files:
  - path: /usr/local/bin/setup-python-env.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      export HOME=/root
      export PYENV_ROOT="/root/.pyenv"
      export PATH="$PYENV_ROOT/bin:$PATH"

      echo "=== Installing pyenv ==="
      curl https://pyenv.run | bash

      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"
      eval "$(pyenv virtualenv-init -)"

      echo "=== Installing Python 3.12.3 ==="
      pyenv install 3.12.3
      pyenv global 3.12.3

      echo "=== Creating devenv virtualenv ==="
      pyenv virtualenv 3.12.3 devenv
      pyenv activate devenv
      pip install --upgrade pip setuptools wheel
      pip install black ruff pytest ipykernel pre-commit

      echo "=== Adding pyenv to /etc/profile.d ==="
      cat > /etc/profile.d/pyenv.sh << 'EOF'
      export PYENV_ROOT="/root/.pyenv"
      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"
      eval "$(pyenv virtualenv-init -)"
      EOF

      echo "=== Creating workspace ==="
      mkdir -p /home/devuser/workspace
      cat > /home/devuser/workspace/check-env.sh << 'CHECKEOF'
      #!/bin/bash
      export PYENV_ROOT="/root/.pyenv"
      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"
      eval "$(pyenv virtualenv-init -)"
      pyenv activate devenv 2>/dev/null || true
      echo "=== Python Environment Check ==="
      python --version
      pip --version
      pyenv versions
      echo "=== Installed Dev Tools ==="
      python -m black --version
      python -m ruff --version
      python -m pytest --version
      echo "=== Done ==="
      CHECKEOF
      chmod +x /home/devuser/workspace/check-env.sh
      chown -R devuser:devuser /home/devuser/workspace
      echo "=== Setup complete ==="

runcmd:
  - /usr/local/bin/setup-python-env.sh >> /var/log/python-setup.log 2>&1
