#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - wget
  - build-essential
  - libssl-dev
  - zlib1g-dev
  - libbz2-dev
  - libreadline-dev
  - libsqlite3-dev
  - libncursesw5-dev
  - xz-utils
  - tk-dev
  - libxml2-dev
  - libxmlsec1-dev
  - libffi-dev
  - liblzma-dev
  - unzip
  - jq

write_files:
  - path: /usr/local/bin/setup-python-env.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      export PYENV_ROOT="/opt/pyenv"
      export PATH="$PYENV_ROOT/bin:$PATH"
      echo "=== Installing pyenv to /opt/pyenv ==="
      git clone https://github.com/pyenv/pyenv.git /opt/pyenv
      git clone https://github.com/pyenv/pyenv-virtualenv.git /opt/pyenv/plugins/pyenv-virtualenv
      chmod -R 755 /opt/pyenv
      eval "$(pyenv init -)"
      eval "$(pyenv virtualenv-init -)"
      echo "=== Installing Python 3.12.3 ==="
      pyenv install 3.12.3
      pyenv global 3.12.3
      echo "=== Creating devenv virtualenv ==="
      pyenv virtualenv 3.12.3 devenv
      pyenv activate devenv
      pip install --upgrade pip setuptools wheel
      pip install black ruff pytest ipykernel pre-commit
      echo "=== Adding pyenv to system profile ==="
      echo 'export PYENV_ROOT="/opt/pyenv"' >> /etc/profile.d/pyenv.sh
      echo 'export PATH="$PYENV_ROOT/bin:$PATH"' >> /etc/profile.d/pyenv.sh
      echo 'eval "$(pyenv init -)"' >> /etc/profile.d/pyenv.sh
      echo 'eval "$(pyenv virtualenv-init -)"' >> /etc/profile.d/pyenv.sh
      chmod +x /etc/profile.d/pyenv.sh
      echo "=== Adding pyenv to devuser .bashrc ==="
      echo 'export PYENV_ROOT="/opt/pyenv"' >> /home/devuser/.bashrc
      echo 'export PATH="$PYENV_ROOT/bin:$PATH"' >> /home/devuser/.bashrc
      echo 'eval "$(pyenv init -)"' >> /home/devuser/.bashrc
      echo 'eval "$(pyenv virtualenv-init -)"' >> /home/devuser/.bashrc
      echo 'pyenv activate devenv 2>/dev/null || true' >> /home/devuser/.bashrc
      echo "=== Creating workspace and check-env.sh ==="
      mkdir -p /home/devuser/workspace
      echo '#!/bin/bash' > /home/devuser/workspace/check-env.sh
      echo 'export PYENV_ROOT="/opt/pyenv"' >> /home/devuser/workspace/check-env.sh
      echo 'export PATH="$PYENV_ROOT/bin:$PATH"' >> /home/devuser/workspace/check-env.sh
      echo 'eval "$(pyenv init -)"' >> /home/devuser/workspace/check-env.sh
      echo 'eval "$(pyenv virtualenv-init -)"' >> /home/devuser/workspace/check-env.sh
      echo 'pyenv activate devenv 2>/dev/null || true' >> /home/devuser/workspace/check-env.sh
      echo 'echo "=== Python Environment Check ==="' >> /home/devuser/workspace/check-env.sh
      echo 'python --version' >> /home/devuser/workspace/check-env.sh
      echo 'pip --version' >> /home/devuser/workspace/check-env.sh
      echo 'pyenv versions' >> /home/devuser/workspace/check-env.sh
      echo 'echo "=== Installed Dev Tools ==="' >> /home/devuser/workspace/check-env.sh
      echo 'python -m black --version' >> /home/devuser/workspace/check-env.sh
      echo 'python -m ruff --version' >> /home/devuser/workspace/check-env.sh
      echo 'python -m pytest --version' >> /home/devuser/workspace/check-env.sh
      echo 'echo "=== Hello World ==="' >> /home/devuser/workspace/check-env.sh
      echo 'python -c "print('"'"'Hello, World!'"'"')"' >> /home/devuser/workspace/check-env.sh
      echo 'echo "=== Done ==="' >> /home/devuser/workspace/check-env.sh
      chmod +x /home/devuser/workspace/check-env.sh
      chown -R devuser:devuser /home/devuser/workspace
      echo "=== Setup complete ==="

runcmd:
  - /usr/local/bin/setup-python-env.sh >> /var/log/python-setup.log 2>&1
