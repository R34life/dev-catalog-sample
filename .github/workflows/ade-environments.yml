# .github/workflows/ade-environment.yml
#
# Creates an ADE environment when a PR is opened or updated.
# Deletes the environment when the PR is closed or merged.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID       - Service principal app ID
#   AZURE_CLIENT_SECRET   - Service principal password
#   AZURE_TENANT_ID       - Azure tenant ID
#   AZURE_SUBSCRIPTION_ID - Azure subscription ID
#   ADE_SSH_PUBLIC_KEY    - SSH public key for the VM
#
# Required GitHub Variables:
#   ADE_DEV_CENTER        - rtdevcenter01
#   ADE_PROJECT           - RT-HelloWorldProject
#   ADE_CATALOG           - rt-dev-catalog
#   ADE_DEFINITION        - LinuxPythonVM
#   ADE_ENV_TYPE          - Non-Prod

name: ADE Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  ENV_NAME: pr-${{ github.event.pull_request.number }}-env

jobs:
  # ── Create or update environment on PR open/push ──────────────
  create-environment:
    name: Create ADE Environment
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Check if environment already exists
        id: check
        run: |
          STATE=$(az devcenter dev environment show \
            --dev-center-name "${{ vars.ADE_DEV_CENTER }}" \
            --project-name "${{ vars.ADE_PROJECT }}" \
            --environment-name "${{ env.ENV_NAME }}" \
            --query provisioningState -o tsv 2>/dev/null || echo "NotFound")
          echo "state=$STATE" >> $GITHUB_OUTPUT
          echo "Environment state: $STATE"

      - name: Write parameters file
        run: |
          cat > /tmp/ade-params.json << EOF
          {
            "vmName": "pr-${{ github.event.pull_request.number }}-vm",
            "adminUsername": "devuser",
            "sshPublicKey": "${{ secrets.ADE_SSH_PUBLIC_KEY }}",
            "vmSize": "Standard_D2s_v3"
          }
          EOF

      - name: Create environment
        if: steps.check.outputs.state == 'NotFound'
        run: |
          az devcenter dev environment create \
            --dev-center-name "${{ vars.ADE_DEV_CENTER }}" \
            --project-name "${{ vars.ADE_PROJECT }}" \
            --environment-name "${{ env.ENV_NAME }}" \
            --environment-type "${{ vars.ADE_ENV_TYPE }}" \
            --catalog-name "${{ vars.ADE_CATALOG }}" \
            --environment-definition-name "${{ vars.ADE_DEFINITION }}" \
            --parameters "@/tmp/ade-params.json"
          echo "✅ Environment ${{ env.ENV_NAME }} created"

      - name: Skip creation (already exists)
        if: steps.check.outputs.state != 'NotFound'
        run: echo "⏭️ Environment ${{ env.ENV_NAME }} already exists (state=${{ steps.check.outputs.state }}), skipping creation"

      - name: Get environment details
        id: details
        run: |
          RG=$(az devcenter dev environment show \
            --dev-center-name "${{ vars.ADE_DEV_CENTER }}" \
            --project-name "${{ vars.ADE_PROJECT }}" \
            --environment-name "${{ env.ENV_NAME }}" \
            --query resourceGroupId -o tsv)
          RG_NAME=$(basename $RG)
          echo "rg_name=$RG_NAME" >> $GITHUB_OUTPUT

          PRIVATE_IP=$(az network nic show \
            --resource-group "$RG_NAME" \
            --name "nic-vm-vnet-pr-${{ github.event.pull_request.number }}-vm" \
            --query "ipConfigurations[0].privateIPAddress" -o tsv 2>/dev/null || echo "pending")
          echo "private_ip=$PRIVATE_IP" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const envName = process.env.ENV_NAME;
            const rgName = '${{ steps.details.outputs.rg_name }}';
            const ip = '${{ steps.details.outputs.private_ip }}';
            const prNum = '${{ github.event.pull_request.number }}';
            const body = [
              '## 🚀 ADE Dev Environment Ready',
              '',
              `**Environment:** \`${envName}\``,
              `**Resource Group:** \`${rgName}\``,
              `**VM Private IP:** \`${ip}\``,
              '',
              '### Connect via Bastion',
              '```bash',
              `az network bastion ssh \\`,
              `  --name bas-pr-${prNum}-vm \\`,
              `  --resource-group ${rgName} \\`,
              `  --target-resource-id $(az vm show -g ${rgName} -n pr-${prNum}-vm --query id -o tsv) \\`,
              `  --auth-type ssh-key \\`,
              `  --username devuser \\`,
              `  --ssh-key ~/.ssh/id_ed25519`,
              '```',
              '',
              '_Environment will be automatically deleted when this PR is closed._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('ADE Dev Environment Ready')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Delete environment when PR is closed ─────────────────────
  delete-environment:
    name: Delete ADE Environment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Delete environment
        run: |
          STATE=$(az devcenter dev environment show \
            --dev-center-name "${{ vars.ADE_DEV_CENTER }}" \
            --project-name "${{ vars.ADE_PROJECT }}" \
            --environment-name "${{ env.ENV_NAME }}" \
            --query provisioningState -o tsv 2>/dev/null || echo "NotFound")

          if [ "$STATE" == "NotFound" ]; then
            echo "⏭️ Environment ${{ env.ENV_NAME }} not found, nothing to delete"
          else
            az devcenter dev environment delete \
              --dev-center-name "${{ vars.ADE_DEV_CENTER }}" \
              --project-name "${{ vars.ADE_PROJECT }}" \
              --environment-name "${{ env.ENV_NAME }}" \
              --yes
            echo "🗑️ Environment ${{ env.ENV_NAME }} deleted"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🗑️ ADE Environment Deleted\n\n`${{ env.ENV_NAME }}` has been deleted as this PR was closed.',
            });
